name = "mailfreem"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_freem_db" #你的d1数据库名称
database_id = "f3079de6-8fb0-4c91-bdab-8fe459ca5f9b" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="admin123"
GUEST_PASSWORD="guest"
JWT_TOKEN="905ed99d8767415ffffde419c8b153749470c65bbe573e022178e67ae723e96e"
JWT_TOKENGUEST_PASSWORD="admin123"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="mg.kif.dpdns.org"
RESEND_API_KEY="admin123"
EMAIL_WEBHOOK_URL="aaaa"
EMAIL_WEBHOOK_SECRET="asdf"
EMAIL_WEBHOOK_TIMEOUT_MS="10000"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true